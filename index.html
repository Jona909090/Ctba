<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#080706">
  <title>Stefan Jonić — Profesionalni portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="portfolio" aria-label="Profesionalni portfolio Stefana Jonića">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Stefan Jonić</span>
      </div>
      <button class="fullscreen-button" id="fullscreenButton" type="button" aria-label="Prikaži preko cijelog ekrana" title="Cijeli ekran">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3H3v5M16 3h5v5M8 21H3v-5M16 21h5v-5"/></svg>
      </button>
    </header>

    <section class="book-stage" aria-label="Digitalna knjiga">
      <div class="book" id="book">
        <div class="book-shadow" aria-hidden="true"></div>

        <article class="sheet is-active" data-page="0" aria-label="Naslovnica">
          <img src="images/pages/01-naslovnica.jpg" alt="Naslovnica profesionalnog portfolija Stefana Jonića" draggable="false">
          <button class="open-hotspot" id="openBook" type="button" aria-label="Otvori knjigu"></button>
        </article>
        <article class="sheet" data-page="1" aria-label="Dobro došli">
          <img src="images/pages/02-dobro-dosli.jpg" alt="Dobro došli u moj profesionalni portfolio" loading="lazy" draggable="false">
        </article>
        <article class="sheet" data-page="2" aria-label="Ko sam ja">
          <img src="images/pages/03-ko-sam-ja.jpg" alt="Ko sam ja — Stefan Jonić" loading="lazy" draggable="false">
        </article>
        <article class="sheet" data-page="3" aria-label="Put oko svijeta">
          <img src="images/pages/04-put-oko-svijeta.jpg" alt="Profesionalni put kroz Katar, UAE i Hrvatsku" loading="lazy" draggable="false">
        </article>
        <article class="sheet" data-page="4" aria-label="Projekti u Kataru">
          <img src="images/pages/05-qatar-projekti.jpg" alt="Projekti u Kataru" loading="lazy" draggable="false">
        </article>
        <article class="sheet" data-page="5" aria-label="Iskustvo u Kataru">
          <img src="images/pages/06-qatar-iskustvo.jpg" alt="Profesionalno iskustvo u Kataru" loading="lazy" draggable="false">
        </article>
        <article class="sheet" data-page="6" aria-label="Projekti u Ujedinjenim Arapskim Emiratima">
          <img src="images/pages/07-uae.jpg" alt="Projekti u Ujedinjenim Arapskim Emiratima" loading="lazy" draggable="false">
        </article>
        <article class="sheet" data-page="7" aria-label="Projekti u Hrvatskoj">
          <img src="images/pages/08-hrvatska.jpg" alt="Projekti u Zagrebu i okolici" loading="lazy" draggable="false">
        </article>
        <article class="sheet" data-page="8" aria-label="Zahvalnica">
          <img src="images/pages/09-zahvalnica.jpg" alt="Zahvalnica tvrtki CTBA" loading="lazy" draggable="false">
        </article>

        <button class="page-zone page-zone-left" id="pageZoneLeft" type="button" aria-label="Prethodna stranica"></button>
        <button class="page-zone page-zone-right" id="pageZoneRight" type="button" aria-label="Sljedeća stranica"></button>
      </div>
    </section>

    <nav class="controls" aria-label="Navigacija knjige">
      <button class="nav-button" id="prevButton" type="button" aria-label="Prethodna stranica">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <div class="progress">
        <span id="currentPage">01</span>
        <div class="progress-track"><span id="progressBar"></span></div>
        <span id="totalPages">09</span>
      </div>
      <button class="nav-button" id="nextButton" type="button" aria-label="Sljedeća stranica">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
      </button>
    </nav>
    <p class="hint">Klikni rub stranice, koristi strelice ili povuci prstom</p>
    <div class="sr-status" id="pageStatus" aria-live="polite"></div>
  </main>
  <script src="script.js"></script>
</body>
</html>
